<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} - Wireframe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F4F5F8;
      padding: 0;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .container {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 0;
      background: #ffffff;
      border: none;
      overflow: visible;
    }
    .container-inner {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.03),
        0 3px 6px rgba(0,0,0,0.04),
        0 8px 16px rgba(0,0,0,0.03);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e5;
      background: #ffffff;
    }
    .logo {
      width: 100px;
      height: 32px;
      background: #F4F5F8;
      border: 1px dashed #e5e5e5;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: #8a8a8a;
    }
    .nav {
      display: flex;
      gap: 16px;
    }
    .nav-item {
      width: 60px;
      height: 24px;
      background: #F4F5F8;
      border: 1px dashed #e5e5e5;
      border-radius: 4px;
    }

    /* Sidebar Layout */
    .layout-sidebar {
      display: flex;
    }
    .sidebar {
      width: 200px;
      min-height: 400px;
      border-right: 1px solid #e5e5e5;
      padding: 16px;
      background: #F4F5F8;
    }
    .sidebar-item {
      height: 32px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 32px;
    }
    .content-full {
      padding: 48px 32px;
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }
    .label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.025em;
      color: #8a8a8a;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input {
      width: 100%;
      max-width: 320px;
      height: 40px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background: #ffffff;
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #222326;
    }
    .input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
    }
    .input-placeholder {
      color: #8a8a8a;
    }
    .button {
      display: inline-block;
      padding: 10px 24px;
      background: #222326;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: background 150ms cubic-bezier(0.16,1,0.3,1);
    }
    .button:hover {
      background: #333538;
    }
    .button-outline {
      background: #ffffff;
      color: #222326;
      border: 1px solid #e5e5e5;
    }
    .button-outline:hover {
      background: #F4F5F8;
    }

    /* Table */
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th, .table td {
      border-bottom: 1px solid #e5e5e5;
      padding: 12px 16px;
      text-align: left;
      font-size: 14px;
    }
    .table th {
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.025em;
      text-transform: uppercase;
      color: #8a8a8a;
      background: #F4F5F8;
    }
    .table td {
      color: #555555;
    }
    .table-row-placeholder {
      background: #F4F5F8;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .card {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
      background: #ffffff;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.03),
        0 3px 6px rgba(0,0,0,0.04),
        0 8px 16px rgba(0,0,0,0.03);
    }
    .card-image {
      width: 100%;
      height: 100px;
      background: #F4F5F8;
      border: 1px dashed #e5e5e5;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8a8a;
      font-size: 12px;
      font-weight: 500;
    }
    .card-title {
      height: 20px;
      background: #F4F5F8;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .card-text {
      height: 40px;
      background: #F4F5F8;
      border-radius: 4px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      width: 400px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.03),
        0 3px 6px rgba(0,0,0,0.04),
        0 8px 16px rgba(0,0,0,0.03);
    }
    .modal-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: #222326;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* Utility */
    .text-center {
      text-align: center;
    }
    .mb-16 {
      margin-bottom: 16px;
    }
    .mb-24 {
      margin-bottom: 24px;
    }
    .title {
      font-size: 1.875rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.2;
      color: #222326;
    }
    .subtitle {
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.5;
      color: #555555;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER: Remove if not needed -->
    <div class="header">
      <div class="logo">[Logo]</div>
      <div class="nav">
        <div class="nav-item"></div>
        <div class="nav-item"></div>
        <div class="nav-item"></div>
      </div>
    </div>

    <!-- CONTENT: Customize based on screen type -->
    <div class="content-full text-center">
      <h1 class="title mb-16">{{title}}</h1>
      <p class="subtitle mb-24">{{description}}</p>

      <!-- FORM EXAMPLE -->
      <div style="max-width: 320px; margin: 0 auto;">
        <div class="form-group">
          <div class="label">Email</div>
          <div class="input"><span class="input-placeholder">example@email.com</span></div>
        </div>
        <div class="form-group">
          <div class="label">Password</div>
          <div class="input"><span class="input-placeholder">********</span></div>
        </div>
        <button class="button" style="width: 100%;">Login</button>
        <button class="button button-outline" style="width: 100%; margin-top: 8px;">Sign Up</button>
      </div>
    </div>
  </div>

  <div style="text-align: center; padding: 8px 0; color: #8a8a8a; font-size: 11px; font-weight: 400; background: #F4F5F8;">
    Generated by Claude Code | {{date}}
  </div>
</body>
</html>
