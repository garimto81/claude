<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}} - Quasar White Mockup</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.prod.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@quasar/extras@1/material-icons/material-icons.css" rel="stylesheet">
  <style>
    :root {
      --q-primary: #374151;
      --q-secondary: #6b7280;
    }
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
    }
    #q-app {
      width: auto;
      max-width: 720px;
      max-height: 1280px;
      margin: 0;
      overflow: auto;
    }
    /* Quasar min-height: 100vh 오버라이드 — 캡처 공백 방지 */
    .q-layout { min-height: auto !important; }
    .q-page-container { min-height: auto !important; padding-top: 50px !important; }
    .q-page { min-height: auto !important; }
    .q-header { position: relative !important; }
    /* White Minimal header */
    .white-header {
      background: #ffffff !important;
      color: #111827 !important;
      border-bottom: 1px solid #e5e7eb;
      box-shadow: none !important;
    }
    .white-header .q-toolbar-title {
      color: #111827;
      font-weight: 500;
    }
    .white-header .q-btn {
      color: #374151;
    }
    /* White Minimal footer */
    .white-footer {
      border-top: 1px solid #e5e7eb;
    }
  </style>
</head>
<body>
  <div id="q-app">
    <q-layout view="hHh lpR fFf">
      <q-header class="white-header">
        <q-toolbar>
          <q-toolbar-title>{{title}}</q-toolbar-title>
          <q-btn flat round dense icon="menu"></q-btn>
        </q-toolbar>
      </q-header>

      <q-page-container>
        <q-page class="q-pa-md">
          <div class="text-h6 q-mb-md" style="color: #111827;">{{description}}</div>

          <!-- CARD SECTION -->
          <q-card flat bordered class="q-mb-md">
            <q-card-section>
              <div class="text-h6" style="color: #111827;">Card Title</div>
              <div class="text-subtitle2" style="color: #6b7280;">Subtitle</div>
            </q-card-section>
            <q-card-section>
              <div class="text-body1" style="color: #374151;">Card content area. Replace with actual content.</div>
            </q-card-section>
            <q-card-actions align="right">
              <q-btn flat color="grey-7">Action 1</q-btn>
              <q-btn flat color="grey-7">Action 2</q-btn>
            </q-card-actions>
          </q-card>

          <!-- FORM SECTION -->
          <q-card flat bordered class="q-mb-md">
            <q-card-section>
              <div class="text-h6 q-mb-md" style="color: #111827;">Form</div>
              <q-input outlined label="Input Label" class="q-mb-sm"></q-input>
              <q-input outlined label="Another Input" class="q-mb-sm"></q-input>
              <q-select outlined label="Select Option" :options="['Option 1', 'Option 2', 'Option 3']" class="q-mb-sm"></q-select>
              <div class="q-mt-md">
                <q-btn color="grey-8" label="Submit" class="q-mr-sm"></q-btn>
                <q-btn outline color="grey-8" label="Cancel"></q-btn>
              </div>
            </q-card-section>
          </q-card>

          <!-- TABLE SECTION -->
          <q-card flat bordered class="q-mb-md">
            <q-card-section>
              <div class="text-h6 q-mb-md" style="color: #111827;">Data Table</div>
              <q-table
                flat
                bordered
                :rows="tableRows"
                :columns="tableColumns"
                row-key="id"
              ></q-table>
            </q-card-section>
          </q-card>

        </q-page>
      </q-page-container>

      <q-footer bordered class="bg-white text-grey-5 text-center q-pa-sm white-footer" style="font-size: 11px;">
        Generated by Claude Code | {{date}}
      </q-footer>
    </q-layout>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.umd.prod.js"></script>
  <script>
    const app = Vue.createApp({
      data() {
        return {
          tableColumns: [
            { name: 'id', label: 'ID', field: 'id', align: 'left' },
            { name: 'name', label: 'Name', field: 'name', align: 'left' },
            { name: 'status', label: 'Status', field: 'status', align: 'left' }
          ],
          tableRows: [
            { id: 1, name: 'Item 1', status: 'Active' },
            { id: 2, name: 'Item 2', status: 'Pending' },
            { id: 3, name: 'Item 3', status: 'Inactive' }
          ]
        }
      }
    })
    app.use(Quasar)
    app.mount('#q-app')
  </script>
</body>
</html>
