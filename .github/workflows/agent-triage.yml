name: Agent Triage
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { issue, pull_request } = context.payload;
            const item = issue || pull_request;
            const title = item.title.toLowerCase();
            const body = (item.body || '').toLowerCase();

            const labels = [];
            if (title.includes('bug') || title.includes('fix')) labels.push('bug');
            if (title.includes('feat') || title.includes('feature')) labels.push('enhancement');
            if (title.includes('docs') || title.includes('prd')) labels.push('documentation');
            if (title.includes('refactor')) labels.push('refactoring');
            if (body.includes('security') || body.includes('vulnerability')) labels.push('security');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: item.number,
                labels: labels
              });
            }
